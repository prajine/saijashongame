<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Level Devil - Mario Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border: 4px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.3);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 2;
        }

        .hud-item {
            background: rgba(0,0,0,0.8);
            padding: 5px 12px;
            border-radius: 15px;
            border: 2px solid #e94560;
        }

        #levelProgress {
            position: absolute;
            top: 50px;
            left: 10px;
            width: 150px;
            height: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            pointer-events: none;
            z-index: 2;
        }

        #levelFill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b9d);
            width: 0%;
            transition: width 0.3s;
        }

        #goalMarker {
            position: absolute;
            top: -5px;
            right: -6px;
            width: 18px;
            height: 18px;
            background: #ffd700;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        #controls {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 15px;
            pointer-events: none;
            z-index: 100;
        }

        .control-group {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(233, 69, 96, 0.8);
            background: rgba(233, 69, 96, 0.2);
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, background 0.1s;
        }

        .ctrl-btn:active {
            transform: scale(0.85);
            background: rgba(233, 69, 96, 0.5);
        }

        .ctrl-btn.jump {
            width: 80px;
            height: 80px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        .ctrl-btn.fire {
            background: rgba(255, 100, 0, 0.3);
            border-color: #ff6600;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            border-radius: 8px;
        }

        .screen-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #e94560, 3px 3px 6px rgba(0,0,0,0.5);
            color: #e94560;
        }

        .screen-subtitle {
            font-size: 18px;
            margin-bottom: 20px;
            opacity: 0.9;
            color: #ff6b9d;
        }

        .level-info {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .play-btn {
            padding: 15px 50px;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(180deg, #e94560, #c73e54);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
            margin: 5px;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.6);
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            opacity: 0.7;
            line-height: 1.6;
        }

        .hidden { display: none !important; }

        #trapAlert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.3s;
        }

        @media (max-width: 768px) {
            #hud { font-size: 13px; }
            .screen-title { font-size: 32px; }
            .ctrl-btn { width: 50px; height: 50px; font-size: 20px; }
            .ctrl-btn.jump { width: 70px; height: 70px; font-size: 12px; }
        }

        @media (pointer: coarse) {
            #controls { display: flex; }
        }
    </style>
</head>

                    { x: 3320, y: GROUND_Y - 80 }, { x: 3360, y: GROUND_Y - 80 },
                    { x: 3630, y: GROUND_Y - 130 }, { x: 3670, y: GROUND_Y - 130 },
                    { x: 3880, y: GROUND_Y - 80 }, { x: 3920, y: GROUND_Y - 80 }
                ],
                enemies: [
                    { type: 0, x: 380, y: GROUND_Y - 48 },
                    { type: 1, x: 750, y: GROUND_Y - 48 },
                    { type: 0, x: 1150, y: GROUND_Y - 48 },
                    { type: 1, x: 1600, y: GROUND_Y - 48 },
                    { type: 2, x: 2000, y: GROUND_Y - 48 },
                    { type: 0, x: 2400, y: GROUND_Y - 48 },
                    { type: 1, x: 2850, y: GROUND_Y - 48 },
                    { type: 2, x: 3300, y: GROUND_Y - 48 },
                    { type: 1, x: 3800, y: GROUND_Y - 48 }
                ],
                fakeFloors: [
                    { x: 500, y: GROUND_Y, width: 50, height: 20, triggered: false },
                    { x: 900, y: GROUND_Y, width: 60, height: 20, triggered: false },
                    { x: 1350, y: GROUND_Y, width: 50, height: 20, triggered: false },
                    { x: 1750, y: GROUND_Y, width: 60, height: 20, triggered: false },
                    { x: 2150, y: GROUND_Y, width: 50, height: 20, triggered: false },
                    { x: 2600, y: GROUND_Y, width: 60, height: 20, triggered: false },
                    { x: 3050, y: GROUND_Y, width: 50, height: 20, triggered: false },
                    { x: 3450, y: GROUND_Y, width: 60, height: 20, triggered: false },
                    { x: 3850, y: GROUND_Y, width: 50, height: 20, triggered: false }
                ],
                movingPlatforms: [
                    { x: 650, y: GROUND_Y - 60, width: 60, height: 20, startX: 600, endX: 700, speed: 2.5, dir: 1 },
                    { x: 1050, y: GROUND_Y - 100, width: 60, height: 20, startX: 1000, endX: 1100, speed: 3, dir: 1 },
                    { x: 1500, y: GROUND_Y - 120, width: 60, height: 20, startX: 1450, endX: 1550, speed: 2, dir: 1 },
                    { x: 1900, y: GROUND_Y - 80, width: 60, height: 20, startX: 1850, endX: 1950, speed: 3.5, dir: 1 },
                    { x: 2300, y: GROUND_Y - 100, width: 60, height: 20, startX: 2250, endX: 2350, speed: 2.5, dir: 1 },
                    { x: 2750, y: GROUND_Y - 80, width: 60, height: 20, startX: 2700, endX: 2800, speed: 3, dir: 1 },
                    { x: 3150, y: GROUND_Y - 120, width: 60, height: 20, startX: 3100, endX: 3200, speed: 2, dir: 1 },
                    { x: 3600, y: GROUND_Y - 100, width: 60, height: 20, startX: 3550, endX: 3650, speed: 4, dir: 1 }
                ],
                goal: 4080
            }
        ];

        let currentLevelData = null;
        let platforms = [];
        let traps = [];
        let spikes = [];
        let coins = [];
        let enemies = [];
        let fireballs = [];
        let enemyProjectiles = [];
        let fakeFloors = [];
        let movingPlatforms = [];
        let goalX = 0;

        function loadLevel(levelNum) {
            currentLevelData = levels[levelNum - 1];
            
            platforms = JSON.parse(JSON.stringify(currentLevelData.platforms));
            traps = JSON.parse(JSON.stringify(currentLevelData.traps));
            spikes = JSON.parse(JSON.stringify(currentLevelData.spikes));
            coins = currentLevelData.coins.map(c => ({ ...c, collected: false, frame: Math.random() * Math.PI * 2 }));
            enemies = currentLevelData.enemies.map(e => createEnemy(e.type, e.x, e.y));
            fireballs = [];
            enemyProjectiles = [];
            fakeFloors = JSON.parse(JSON.stringify(currentLevelData.fakeFloors));
            movingPlatforms = JSON.parse(JSON.stringify(currentLevelData.movingPlatforms));
            goalX = currentLevelData.goal;
            
            player.x = 80;
            player.y = GROUND_Y - 48;
            player.vx = 0;
            player.vy = 0;
            player.invincible = false;
            player.onGround = false;
            player.direction = 1;
            player.spawned = false;
            
            cameraX = 0;
            score = 0;
            lives = 3;
            
            updateHUD();
        }

        function createEnemy(type, x, y) {
            const enemyTypes = [
                { sprite: 'enemy1', hp: 1, speed: 2, points: 100, shootInterval: null, hasShield: false },
                { sprite: 'enemy2', hp: 2, speed: 1.5, points: 200, shootInterval: 120, hasShield: false },
                { sprite: 'enemy3', hp: 3, speed: 3, points: 500, shootInterval: 90, hasShield: true }
            ];
            
            const config = enemyTypes[type];
            return {
                sprite: config.sprite,
                hp: config.hp,
                maxHp: config.hp,
                speed: config.speed,
                x, y: y || GROUND_Y - 48,
                width: 44,
                height: 44,
                type: type,
                direction: -1,
                points: config.points,
                shootInterval: config.shootInterval,
                shootTimer: config.shootInterval || 0,
                hasShield: config.hasShield,
                shieldHp: config.hasShield ? 1 : 0,
                active: true,
                flashTimer: 0
            };
        }

        function showTrapAlert(text) {
            const alert = document.getElementById('trapAlert');
            alert.textContent = text;
            alert.style.opacity = 1;
            setTimeout(() => alert.style.opacity = 0, 800);
        }

        function startGame() {
            gameState = 'playing';
            currentLevel = 1;
            totalScore = 0;
            loadLevel(currentLevel);
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            document.getElementById('victoryScreen').classList.add('hidden');
        }

        function restartLevel() {
            gameState = 'playing';
            loadLevel(currentLevel);
            document.getElementById('gameOverScreen').classList.add('hidden');
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel > levels.length) {
                gameState = 'victory';
                document.getElementById('totalScore').textContent = `Total Score: ${totalScore}`;
                document.getElementById('victoryScreen').classList.remove('hidden');
            } else {
                gameState = 'playing';
                loadLevel(currentLevel);
                document.getElementById('levelCompleteScreen').classList.add('hidden');
            }
        }

        function showMenu() {
            gameState = 'menu';
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            document.getElementById('victoryScreen').classList.add('hidden');
        }

        function die(reason) {
            lives--;
            if (lives <= 0) {
                gameState = 'gameover';
                document.getElementById('deathReason').textContent = reason;
                document.getElementById('finalScore').textContent = `Score: ${score}`;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            } else {
                player.x = 80;
                player.y = GROUND_Y - 48;
                player.vx = 0;
                player.vy = 0;
                player.invincible = true;
                player.invincibleTimer = 90;
                cameraX = 0;
            }
            updateHUD();
        }

        function completeLevel() {
            totalScore += score;
            gameState = 'levelComplete';
            document.getElementById('levelScore').textContent = `Score: ${score}`;
            document.getElementById('levelCompleteScreen').classList.remove('hidden');
        }

        function updateHUD() {
            document.getElementById('scoreDisplay').textContent = `Score: ${score}`;
            document.getElementById('livesDisplay').textContent = '❤️'.repeat(Math.max(0, lives));
            document.getElementById('levelDisplay').textContent = currentLevelData ? currentLevelData.name : `Level ${currentLevel}`;
            
            const progress = Math.min((player.x / goalX) * 100, 100);
            document.getElementById('levelFill').style.width = progress + '%';
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function shootFireball() {
            if (player.canShoot && fireballs.length < 5) {
                fireballs.push({
                    x: player.x + (player.direction === 1 ? player.width : -10),
                    y: player.y + player.height / 2 - 8,
                    width: 14,
                    height: 14,
                    vx: player.direction * 12
                });
                player.canShoot = false;
                setTimeout(() => player.canShoot = true, 200);
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            frameCount++;

            if (player.invincible) {
                player.invincibleTimer--;
                if (player.invincibleTimer <= 0) player.invincible = false;
            }

            if (keys.left) {
                player.vx = -player.speed;
                player.direction = -1;
            } else if (keys.right) {
                player.vx = player.speed;
                player.direction = 1;
            } else {
                player.vx *= 0.85;
            }

            if (keys.jump && player.onGround) {
                player.vy = player.jumpPower;
                player.onGround = false;
            }

            if (keys.fire) {
                shootFireball();
                keys.fire = false;
            }

            player.vy += GRAVITY;
            player.x += player.vx;
            player.y += player.vy;

            if (player.y > CANVAS_HEIGHT + 100) {
                showTrapAlert("FELL INTO THE VOID!");
                die("Fell into the void!");
                return;
            }

            player.onGround = false;

            if (player.y + player.height > GROUND_Y) {
                player.y = GROUND_Y - player.height;
                player.vy = 0;
                player.onGround = true;
            }

            platforms.forEach(plat => {
                if (player.vy >= 0 &&
                    player.x + player.width > plat.x &&
                    player.x < plat.x + plat.width &&
                    player.y + player.height > plat.y &&
                    player.y + player.height < plat.y + plat.height + player.vy + 5) {
                    player.y = plat.y - player.height;
                    player.vy = 0;
                    player.onGround = true;
                }
            });

            fakeFloors.forEach(ff => {
                if (!ff.triggered &&
                    player.x + player.width > ff.x &&
                    player.x < ff.x + ff.width &&
                    player.y + player.height >= ff.y &&
                    player.y + player.height <= ff.y + ff.height + 10 &&
                    player.vy >= 0) {
                    ff.triggered = true;
                    showTrapAlert("FAKE FLOOR!");
                }
                
                if (ff.triggered) {
                    ff.y += 10;
                }
            });

            movingPlatforms.forEach(mp => {
                mp.x += mp.speed * mp.dir;
                if (mp.x <= mp.startX || mp.x >= mp.endX) mp.dir *= -1;
                
                if (player.vy >= 0 &&
                    player.x + player.width > mp.x &&
                    player.x < mp.x + mp.width &&
                    player.y + player.height >= mp.y &&
                    player.y + player.height <= mp.y + mp.height + player.vy + 5) {
                    player.y = mp.y - player.height;
                    player.vy = 0;
                    player.onGround = true;
                    player.x += mp.speed * mp.dir;
                }
            });

            cameraX = player.x - CANVAS_WIDTH / 3;
            cameraX = Math.max(0, Math.min(cameraX, goalX - CANVAS_WIDTH + 200));

            fireballs.forEach((fb, i) => {
                fb.x += fb.vx;
                if (fb.x < cameraX - 50 || fb.x > cameraX + CANVAS_WIDTH + 50) {
                    fireballs.splice(i, 1);
                }
            });

            enemyProjectiles.forEach((ep, i) => {
                ep.x += ep.vx;
                if (ep.x < cameraX - 50 || ep.x > cameraX + CANVAS_WIDTH + 50) {
                    enemyProjectiles.splice(i, 1);
                }
            });

            enemies = enemies.filter(e => {
                if (e.x < cameraX - 100 || e.x > cameraX + CANVAS_WIDTH + 200) return true;
                return e.hp > 0;
            });

            enemies.forEach(enemy => {
                if (!enemy.active || enemy.hp <= 0) return;

                enemy.x += enemy.speed * enemy.direction;
                
                if (enemy.x < cameraX || enemy.x + enemy.width > cameraX + CANVAS_WIDTH) {
                    enemy.direction *= -1;
                }

                if (enemy.shootInterval) {
                    enemy.shootTimer--;
                    if (enemy.shootTimer <= 0) {
                        enemy.shootTimer = enemy.shootInterval;
                        const dir = player.x > enemy.x ? 1 : -1;
                        enemyProjectiles.push({
                            x: enemy.x + enemy.width / 2,
                            y: enemy.y + enemy.height / 2,
                            width: 12,
                            height: 12,
                            vx: dir * 5
                        });
                    }
                }

                if (enemy.flashTimer > 0) enemy.flashTimer--;

                fireballs.forEach((fb, fi) => {
                    if (checkCollision(fb, enemy)) {
                        fireballs.splice(fi, 1);
                        
                        if (enemy.hasShield && enemy.shieldHp > 0) {
                            enemy.shieldHp--;
                            if (enemy.shieldHp <= 0) enemy.hasShield = false;
                        } else {
                            enemy.hp--;
                            if (enemy.hp <= 0) {
                                enemy.active = false;
                                score += enemy.points;
                            }
                        }
                        updateHUD();
                    }
                });

                if (!player.invincible && checkCollision(player, enemy)) {
                    die("Hit by enemy!");
                }
            });

            enemyProjectiles.forEach((ep, i) => {
                if (!player.invincible && checkCollision(player, {x: ep.x, y: ep.y, width: ep.width, height: ep.height})) {
                    enemyProjectiles.splice(i, 1);
                    die("Hit by projectile!");
                }
            });

            spikes.forEach(spike => {
                if (!player.invincible && checkCollision(player, {x: spike.x, y: spike.y, width: spike.width, height: spike.height})) {
                    die("Impaled on spikes!");
                }
            });

            coins.forEach(coin => {
                if (!coin.collected) {
                    coin.frame += 0.1;
                    if (checkCollision(player, {x: coin.x, y: coin.y, width: coin.size || 24, height: coin.size || 24})) {
                        coin.collected = true;
                        score += 100;
                        updateHUD();
                    }
                }
            });

            if (player.x >= goalX) {
                completeLevel();
            }

            updateHUD();
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            const parallax = cameraX * 0.3;
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            for (let i = 0; i < 20; i++) {
                const x = (i * 200 - parallax % 200);
                ctx.beginPath();
                ctx.arc(x, 100 + (i % 3) * 50, 30 + (i % 4) * 20, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#0f0f1a';
            traps.forEach(trap => {
                const screenX = trap.x - cameraX;
                if (screenX < CANVAS_WIDTH && screenX + trap.width > 0) {
                    ctx.fillRect(Math.max(0, screenX), trap.y, Math.min(trap.width, CANVAS_WIDTH - screenX), CANVAS_HEIGHT - trap.y);
                }
            });

            platforms.forEach(plat => {
                const screenX = plat.x - cameraX;
                if (screenX < CANVAS_WIDTH && screenX + plat.width > 0) {
                    ctx.fillStyle = '#2d5a27';
                    ctx.fillRect(screenX, plat.y, plat.width, plat.height);
                    ctx.fillStyle = '#3d7a37';
                    ctx.fillRect(screenX, plat.y, plat.width, 15);
                }
            });

            fakeFloors.forEach(ff => {
                if (ff.y < CANVAS_HEIGHT + 50) {
                    const screenX = ff.x - cameraX;
                    if (screenX < CANVAS_WIDTH && screenX + ff.width > 0) {
                        ctx.fillStyle = ff.triggered ? '#ff4444' : '#2d5a27';
                        ctx.fillRect(screenX, ff.y, ff.width, ff.height);
                        if (!ff.triggered) {
                            ctx.fillStyle = '#3d7a37';
                            ctx.fillRect(screenX, ff.y, ff.width, 5);
                        }
                    }
                }
            });

            movingPlatforms.forEach(mp => {
                const screenX = mp.x - cameraX;
                if (screenX < CANVAS_WIDTH && screenX + mp.width > 0) {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(screenX, mp.y, mp.width, mp.height);
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(screenX, mp.y + mp.height - 4, mp.width, 4);
                }
            });

            spikes.forEach(spike => {
                const screenX = spike.x - cameraX;
                if (screenX < CANVAS_WIDTH && screenX + spike.width > 0) {
                    ctx.fillStyle = '#ff4444';
                    const numSpikes = Math.floor(spike.width / 15);
                    for (let i = 0; i < numSpikes; i++) {
                        ctx.beginPath();
                        ctx.moveTo(screenX + i * 15, spike.y + spike.height);
                        ctx.lineTo(screenX + i * 15 + 7, spike.y);
                        ctx.lineTo(screenX + i * 15 + 14, spike.y + spike.height);
                        ctx.fill();
                    }
                }
            });

            coins.forEach(coin => {
                if (!coin.collected) {
                    const screenX = coin.x - cameraX;
                    if (screenX > -30 && screenX < CANVAS_WIDTH + 30) {
                        ctx.save();
                        ctx.translate(screenX + 12, coin.y + 12);
                        ctx.rotate(Math.sin(coin.frame) * 0.3);
                        ctx.fillStyle = '#FFD700';
                        ctx.beginPath();
                        ctx.ellipse(0, 0, 12 * 0.8, 12, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FFA500';
                        ctx.beginPath();
                        ctx.ellipse(0, 0, 8, 10, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            });

            const goalScreenX = goalX - cameraX;
            if (goalScreenX > -50 && goalScreenX < CANVAS_WIDTH + 50) {
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 24px Arial';
                ctx.fillText('🏁 GOAL', goalScreenX - 20, GROUND_Y - 60);
                ctx.fillStyle = '#333';
                ctx.fillRect(goalScreenX, GROUND_Y - 50, 60, 50);
                ctx.fillStyle = '#fff';
                ctx.fillRect(goalScreenX + 10, GROUND_Y - 45, 15, 15);
                ctx.fillRect(goalScreenX + 35, GROUND_Y - 45, 15, 15);
                ctx.fillRect(goalScreenX + 10, GROUND_Y - 25, 15, 15);
                ctx.fillRect(goalScreenX + 35, GROUND_Y - 25, 15, 15);
                ctx.fillRect(goalScreenX + 25, GROUND_Y - 35, 10, 15);
            }

            const playerScreenX = player.x - cameraX;
            if (sprites.mario.complete && sprites.mario.naturalWidth > 0) {
                ctx.save();
                if (player.invincible && Math.floor(frameCount / 4) % 2 === 0) {
                    ctx.globalAlpha = 0.4;
                }
                ctx.translate(playerScreenX + player.width, player.y);
                ctx.scale(-player.direction, 1);
                ctx.drawImage(sprites.mario, 0, 0, player.width, player.height);
                ctx.restore();
            } else {
                ctx.fillStyle = player.invincible && Math.floor(frameCount / 4) % 2 === 0 ? '#ff6b6b' : '#ff4444';
                ctx.fillRect(playerScreenX, player.y, player.width, player.height);
                ctx.fillStyle = '#ffcc99';
                ctx.fillRect(playerScreenX + 8, player.y + 6, 28, 14);
            }

            enemies.forEach(enemy => {
                if (!enemy.active || enemy.hp <= 0) return;
                const screenX = enemy.x - cameraX;
                if (screenX > -100 && screenX < CANVAS_WIDTH + 100) {
                    const sprite = sprites[enemy.sprite];
                    if (sprite.complete && sprite.naturalWidth > 0) {
                        ctx.save();
                        if (enemy.flashTimer > 0 && Math.floor(enemy.flashTimer / 3) % 2 === 0) {
                            ctx.globalAlpha = 0.5;
                        }
                        ctx.drawImage(sprite, screenX, enemy.y, enemy.width, enemy.height);
                        ctx.restore();
                    } else {
                        ctx.fillStyle = '#8B008B';
                        ctx.fillRect(screenX, enemy.y, enemy.width, enemy.height);
                    }
                    
                    if (enemy.hasShield) {
                        ctx.strokeStyle = '#00ffff';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(screenX + enemy.width/2, enemy.y + enemy.height/2, enemy.width/2 + 6, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    const hpBarWidth = 36;
                    const hpPercent = enemy.hp / enemy.maxHp;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(screenX + enemy.width/2 - hpBarWidth/2, enemy.y - 10, hpBarWidth, 5);
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(screenX + enemy.width/2 - hpBarWidth/2, enemy.y - 10, hpBarWidth * hpPercent, 5);
                }
            });

            fireballs.forEach(fb => {
                const screenX = fb.x - cameraX;
                if (screenX > -30 && screenX < CANVAS_WIDTH + 30) {
                    const gradient = ctx.createRadialGradient(screenX + fb.width/2, fb.y + fb.height/2, 0, screenX + fb.width/2, fb.y + fb.height/2, fb.width/2);
                    gradient.addColorStop(0, '#fff');
                    gradient.addColorStop(0.3, '#ffff00');
                    gradient.addColorStop(0.7, '#ff6600');
                    gradient.addColorStop(1, '#ff0000');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(screenX + fb.width/2, fb.y + fb.height/2, fb.width/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            enemyProjectiles.forEach(ep => {
                const screenX = ep.x - cameraX;
                if (screenX > -30 && screenX < CANVAS_WIDTH + 30) {
                    ctx.fillStyle = '#ff4444';
                    ctx.beginPath();
                    ctx.arc(screenX + ep.width/2, ep.y + ep.height/2, ep.width/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ' || e.key === 'w' || e.key === 'W') { keys.jump = true; e.preventDefault(); }
            if (e.key === 'x' || e.key === 'X' || e.key === 'f' || e.key === 'F') keys.fire = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === ' ' || e.key === 'w' || e.key === 'W') keys.jump = false;
        });

        function setupTouchButton(id, keyName) {
            const btn = document.getElementById(id);
            if (!btn) return;
            const start = (e) => { e.preventDefault(); keys[keyName] = true; };
            const end = (e) => { e.preventDefault(); keys[keyName] = false; };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
            btn.addEventListener('touchcancel', end);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
            btn.addEventListener('mouseleave', end);
        }

        setupTouchButton('btnLeft', 'left');
        setupTouchButton('btnRight', 'right');
        setupTouchButton('btnJump', 'jump');
        setupTouchButton('btnFire', 'fire');

        gameLoop();
    </script>
</body>
</html>
